name: timegrid_mobile
description: "TimeGrid Mobile App - Employee time tracking and onboarding"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Navigation
  go_router: ^14.6.2
  
  # HTTP Client
  http: ^1.2.2
  
  # Local Storage
  shared_preferences: ^2.3.3
  
  # Video Player
  video_player: ^2.9.2
  
  # File Picker
  file_picker: ^8.1.6
  
  # Date/Time Picker
  flutter_datetime_picker_plus: ^2.2.0
  
  # JSON Serialization
  json_annotation: ^4.9.0
  
  # Utils
  intl: ^0.20.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
